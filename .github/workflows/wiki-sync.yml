name: Wiki sync

on:
  schedule:
    # weekly, Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python3 scripts/wiki_sync.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/wiki-status.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/wiki-status.json
            git commit -m "chore: wiki-status sync $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no change"
          fi
